name: store_analytics_dashboard
description: Vernon Store Analytics Dashboard — Web PWA, Android, iOS.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # DI
  get_it: ^8.0.3

  # Network
  dio: ^5.7.0
  web_socket_channel: ^3.0.1

  # Functional Programming
  dartz: ^0.10.1

  # Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.3

  # Utils
  intl: ^0.19.0

  # Media
  video_player: ^2.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
